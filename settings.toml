# Dynaconf 配置文件

[default]
debug = false
environment = "default"

[default.app]
name = "PythonDL"
version = "1.0.0"
debug = false

[default.server]
host = "0.0.0.0"
port = 8000
workers = 4

[default.database]
host = "127.0.0.1"
port = 3306
user = "python"
password = "123456"
name = "py_demo"
echo = false
pool_size = 20
max_overflow = 10

[default.redis]
host = "127.0.0.1"
port = 6379
password = "123456"
db = 0

[default.security]
secret_key = "your-secret-key-change-in-production"
jwt_secret_key = "jwt-secret-key-change-in-production"
algorithm = "HS256"
access_token_expire_minutes = 30
refresh_token_expire_days = 7
password_min_length = 6

[default.log]
level = "INFO"
dir = "logs"
retention_days = 30

[default.cache]
dir = "runtimes/cache"
ttl = 3600

[default.files]
upload_dir = "files/uploads"
upload_max_size = 104857600
allowed_extensions = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "xls", "xlsx"]

[default.smtp]
host = "smtp.qq.com"
port = 465
user = ""
password = ""
use_tls = true

[default.cors]
origins = ["*"]
allow_credentials = true
allow_methods = ["*"]
allow_headers = ["*"]

[default.rate_limit]
max_requests = 1000
window_seconds = 60

[development]
debug = true
environment = "development"
log_level = "DEBUG"
database_echo = true

[production]
debug = false
environment = "production"
log_level = "WARNING"
database_pool_size = 50
database_max_overflow = 20