# Dynaconf 配置文件

[default]
debug = false
environment = "default"

# 应用配置
app_name = "PythonDL"
app_version = "1.0.0"
api_prefix = "/api/v1"

# 数据库配置
database_url = "mysql+pymysql://python:123456@127.0.0.1:3306/py_demo"
database_echo = false
database_pool_size = 20
database_max_overflow = 10

# Redis 配置
redis_host = "127.0.0.1"
redis_port = 6379
redis_password = "123456"
redis_db = 0
redis_url = "redis://:123456@127.0.0.1:6379/0"

# 安全配置
secret_key = "your-secret-key-change-in-production"
algorithm = "HS256"
access_token_expire_minutes = 30
refresh_token_expire_days = 7

# 日志配置
log_level = "INFO"
log_dir = "logs"
log_format = "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
log_max_bytes = 10485760
log_backup_count = 30

# 缓存配置
cache_dir = "runtimes/cache"
cache_default_expire = 3600

# 文件上传配置
upload_dir = "files/uploads"
upload_max_size = 104857600
allowed_extensions = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "xls", "xlsx"]

# 系统配置
system_name = "PythonDL 智能分析平台"
system_description = "全栈智能分析平台"
system_version = "1.0.0"

[development]
debug = true
environment = "development"
log_level = "DEBUG"
database_echo = true

[production]
debug = false
environment = "production"
log_level = "WARNING"
database_pool_size = 50
database_max_overflow = 20
